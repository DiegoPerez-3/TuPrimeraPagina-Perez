{% extends 'base.html' %}

{% block content %}
    <h2>Cambiar Contraseña</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" class="btn-action">Cambiar Contraseña</button>
        <a href="{% url 'profile' %}" class="btn-action" style="background-color: #777;">Cancelar</a>
    </form>
{% endblock %}
