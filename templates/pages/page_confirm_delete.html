{% extends 'base.html' %}

{% block content %}
    <h2>Confirmar Borrado</h2>
    <p>¿Estás seguro que deseas borrar la página "<strong>{{ object.titulo }}</strong>"?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn-action btn-danger">Sí, borrar</button>
        <a href="{% url 'page_detail' object.id %}" class="btn-action" style="background-color: #777;">Cancelar</a>
    </form>
{% endblock %}
