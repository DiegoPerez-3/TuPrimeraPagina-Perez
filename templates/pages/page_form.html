{% extends 'base.html' %}

{% block content %}
    <h2>{% if object %}Editar{% else %}Crear{% endif %} Página</h2>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.media }}
        {{ form.as_p }}
        <button type="submit" class="btn-action">Guardar</button>
        <a href="{% url 'page_list' %}" class="btn-action btn-danger" style="background-color: #777;">Cancelar</a>
    </form>
{% endblock %}
