<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Reseñas de películas y series</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
            margin: 0;
            padding: 0;
        }

        header {
            background-color: #222;
            color: white;
            padding: 20px;
            text-align: center;
        }

        nav {
            background-color: #444;
            padding: 10px;
            text-align: center;
        }

        nav a {
            color: white;
            text-decoration: none;
            margin: 0 10px;
            font-weight: bold;
        }

        main {
            width: 80%;
            margin: 30px auto;
            background-color: white;
            padding: 25px;
            border-radius: 10px;
        }

        h1, h2 {
            color: #333;
        }

        form {
            margin-top: 20px;
        }

        input, textarea, select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
        }

        button {
            background-color: #222;
            color: white;
            padding: 10px 15px;
            border: none;
            cursor: pointer;
        }

        .card {
            background-color: #f1f1f1;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 8px;
        }

        footer {
            text-align: center;
            padding: 20px;
            color: #777;
        }
    </style>
</head>
<body>

<header>
    <h1>Reseñas de películas y series</h1>
    <p>Mi primera página web hecha con Django</p>
</header>

<nav>
    <a href="{% url 'inicio' %}">Inicio</a>
    <a href="{% url 'lista_peliculas' %}">Películas y series</a>
    <a href="{% url 'crear_genero' %}">Crear género</a>
    <a href="{% url 'crear_pelicula' %}">Crear película/serie</a>
    <a href="{% url 'crear_resena' %}">Crear reseña</a>
    <a href="{% url 'buscar_pelicula' %}">Buscar</a>
</nav>

<main>
    {% block contenido %}
    {% endblock %}
</main>

<footer>
    <p>Proyecto Django - TuPrimeraPagina+Perez</p>
</footer>

</body>
</html>
